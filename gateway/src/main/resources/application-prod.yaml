server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: schedule-service
          uri: http://schedule:8081
          predicates:
            - Path=/schedule/**
          filters:
            - StripPrefix=1

        - id: ticketing-service
          uri: http://ticketing:8082
          predicates:
            - Path=/ticketing/**
          filters:
            - StripPrefix=1

        - id: notification-service
          uri: http://notification:8083
          predicates:
            - Path=/notification/**
          filters:
            - StripPrefix=1

        - id: user-service
          uri: http://user:8084
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway





