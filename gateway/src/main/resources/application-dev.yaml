server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: schedule-service
          uri: http://localhost:8081
          predicates:
            - Path=/schedule/**
          filters:
            - StripPrefix=1

        - id: ticketing-service
          uri: http://localhost:8082
          predicates:
            - Path=/ticketing/**
          filters:
            - StripPrefix=1

        - id: notification-service
          uri: http://localhost:8083
          predicates:
            - Path=/notification/**
          filters:
            - StripPrefix=1

        - id: user-service
          uri: http://localhost:8084
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

