server:
  port: 0  # Random port for tests

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false

  h2:
    console:
      enabled: false

# Mock external services for tests
feign:
  schedule:
    name: scheduleFeignClient
    url: http://localhost:9999
  notification:
    name: notificationFeignClient
    url: http://localhost:9999

logging:
  level:
    io.github.ktrzaskoma: DEBUG
