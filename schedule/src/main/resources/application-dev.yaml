server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:schedule_db
    driver-class-name: org.h2.Driver
    username: ${H2_DB_USERNAME}
    password: ${H2_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true

feign:
  user:
    name: userFeignClient
    url: http://localhost:8084
  ticketing:
    name: ticketingFeignClient
    url: http://localhost:8082
  notification:
    name: notificationFeignClient
    url: http://localhost:8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
